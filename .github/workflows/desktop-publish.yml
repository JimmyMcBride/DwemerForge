name: Desktop Shell Publish

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  package:
    name: Package desktop shell
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Package desktop shell
        run: pnpm --filter @dwemerforge/desktop dist

      - name: Upload desktop package artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-package-${{ matrix.os }}
          path: apps/desktop/release/**
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v3
        with:
          files: apps/desktop/release/**
          fail_on_unmatched_files: false
