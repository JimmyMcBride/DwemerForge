name: Desktop Shell Build

on:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-release.yml"
  push:
    branches:
      - main
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-release.yml"

permissions:
  contents: read

jobs:
  build:
    name: Build desktop shell
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10.32.1

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: pnpm --filter @dwemerforge/desktop typecheck

      - name: Build desktop
        run: pnpm --filter @dwemerforge/desktop build

      - name: Upload desktop build artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-shell-${{ matrix.os }}
          path: |
            apps/desktop/out/**
          if-no-files-found: error
