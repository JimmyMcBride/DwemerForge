name: Desktop Shell Release

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-release.yml"
  push:
    branches:
      - main
    tags:
      - "desktop-v*"
    paths:
      - "apps/desktop/**"
      - "packages/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/desktop-release.yml"

permissions:
  contents: write

jobs:
  build:
    name: Build desktop shell
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck desktop
        run: pnpm --filter @dwemerforge/desktop typecheck

      - name: Build desktop
        run: pnpm --filter @dwemerforge/desktop build

      - name: Package desktop shell
        if: startsWith(github.ref, 'refs/tags/desktop-v') || github.event_name == 'workflow_dispatch'
        run: pnpm --filter @dwemerforge/desktop dist

      - name: Upload desktop build artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-shell-${{ matrix.os }}
          path: |
            apps/desktop/out/**
            apps/desktop/release/**
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v3
        with:
          files: apps/desktop/release/**
          fail_on_unmatched_files: false
